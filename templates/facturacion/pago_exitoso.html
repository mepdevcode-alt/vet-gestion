{% extends 'base.html' %}

{% block title %}Pago exitoso — VetGestión{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto text-center py-16">
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-10">
        <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 mb-2">¡Pago realizado!</h1>
        <p class="text-gray-500 mb-1">Tu pago fue procesado correctamente.</p>
        <p class="text-gray-400 text-sm mb-6">Factura #{{ factura.id }} — Total: ${{ factura.total }}</p>
        <a href="{% url 'detalle_factura' factura.pk %}"
           class="inline-block bg-indigo-600 text-white px-6 py-2 rounded-md font-medium hover:bg-indigo-700 transition">
            Ver factura
        </a>
    </div>
</div>
{% endblock %}
